<body class="selection-orange">
    <div id="root"></div>

                setCurrentPage(id);

            };

            return (
                <nav className="fixed top-0 w-full z-50 bg-white/90 backdrop-blur-md border-b border-gray-100/50">
                    <div className="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
                        <button onClick={() => handleNavClick('home')} className="flex items-center space-x-2 group">

                                src="https://gardenofvee.africa/_assets/media/e64d177df4a837090c086e43ad81e6f8.png" 
                                alt="Logo" 
                                className="h-10 md:h-12 w-auto transition-transform group-hover:scale-105"
                            />
                        </button>

                        <div className="hidden lg:flex items-center space-x-10 text-[11px] uppercase tracking-[0.2em] font-bold">

                                    key={link.id}

                                        const el = document.getElementById('contact');

                                    }, 100);
                                }}

                            >
                                Enquire
                            </button>
                        </div>

                        <button className="lg:hidden p-2 text-gray-600" onClick={() => setIsMenuOpen(!isMenuOpen)}>

                    <span className="text-[11px] uppercase tracking-[0.6em] font-black text-[#D16B3D] mb-10 block">Spirituality</span>
                    <h2 className="text-6xl md:text-7xl lg:text-8xl font-light mb-16 tracking-tight">Faith & Reflection</h2>
                    <div className="mb-24 rounded-[4rem] overflow-hidden aspect-video max-w-5xl mx-auto shadow-3xl border border-white/10 ring-1 ring-white/5">
                        <img src="https://gardenofvee.africa/_assets/media/be24386fe8c183f693ec6dd6707bace0.png" className="w-full h-full object-cover" />
                    </div>
                    <p className="text-2xl text-gray-400 mb-24 max-w-3xl mx-auto font-light leading-relaxed">Christian-rooted spaces for prayer, Bible-based scripture, and reflection. Participation is always optional, and all are welcome.</p>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-12 text-left mb-24">
                        <div className="bg-white/[0.03] backdrop-blur-md p-16 rounded-[3.5rem] border border-white/5 hover:border-white/10 transition-colors">
                            <h4 className="text-[11px] uppercase tracking-[0.4em] font-black text-[#D16B3D] mb-12">Gatherings</h4>
                            <ul className="space-y-8">{["Scripture reflection", "Prayer evenings", "Bible study", "Praise and worship events"].map(item => <li key={item} className="text-2xl font-light text-gray-200 flex items-center"><div className="w-2 h-2 rounded-full bg-[#D16B3D] mr-6" />{item}</li>)}</ul>
                        </div>
                        <div className="bg-white/[0.03] backdrop-blur-md p-16 rounded-[3.5rem] border border-white/5 flex flex-col justify-center">
                            <h4 className="text-[11px] uppercase tracking-[0.4em] font-black text-[#D16B3D] mb-12">The Faith</h4>
                            <p className="text-3xl font-light text-gray-200 leading-relaxed italic">"Biblically grounded gatherings centred on Christian doctrine with Bible-based scripture. Open to believers and seekers alike."</p>
                        </div>
                    </div>
                    <button onClick={() => { setCurrentPage('gatherings'); window.scrollTo({top:0, behavior:'smooth'}); }} className="bg-[#D16B3D] text-white px-16 py-6 rounded-full hover:bg-[#b55a32] transition-all transform hover:scale-105 active:scale-95 uppercase tracking-[0.3em] text-[11px] font-black shadow-2xl shadow-[#D16B3D]/30">View Upcoming Gatherings</button>
                </div>
            </motion.section>
        );

        const TeamPage = () => (
            <motion.section initial={{ opacity: 0, scale: 0.95 }} animate={{ opacity: 1, scale: 1 }} className="py-40 bg-[#fcfbf9] min-h-screen text-center">
                <div className="max-w-7xl mx-auto px-6">
                    <span className="text-[11px] uppercase tracking-[0.6em] font-black text-[#D16B3D] mb-8 block">Leadership</span>
                    <h2 className="text-6xl md:text-7xl font-light mb-12 text-gray-800 tracking-tight">Team & Culture</h2>
                    <p className="text-2xl text-gray-500 max-w-3xl mx-auto font-light leading-relaxed mb-32">Facilitated experiences designed to support leadership development and team alignment. We help build cultures that thrive.</p>
                    <div className="grid grid-cols-1 gap-12 max-w-6xl mx-auto mb-40">
                        <div className="group relative overflow-hidden rounded-[4rem] aspect-video shadow-3xl border border-gray-100">
                            <img src="https://gardenofvee.africa/_assets/media/7a26e6a4a3266d5bcfe41e41dcd75e2a.png" className="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110" />
                            <div className="absolute inset-0 bg-black/10 group-hover:bg-transparent transition-colors duration-500" />
                        </div>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-16 max-w-6xl mx-auto">
                        {[{ title: "Alignment", desc: "Ensuring every team member is moving toward the same vision." }, { title: "Leadership", desc: "Developing the core skills needed to guide others effectively." }, { title: "Wellbeing", desc: "Creating work environments that prioritize human health." }].map(item => (
                            <div key={item.title}><h4 className="text-[11px] uppercase tracking-[0.5em] font-black text-[#D16B3D] mb-6">{item.title}</h4><p className="text-base text-gray-400 font-light leading-relaxed">{item.desc}</p></div>
                        ))}
                    </div>
                </div>
            </motion.section>
        );

        const GatheringsPage = () => (
            <motion.section initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="py-40 bg-[#9f694c] text-white min-h-screen relative overflow-hidden">
                <div className="max-w-6xl mx-auto px-6 relative z-10">
                    <div className="text-center mb-32">
                        <span className="text-[11px] uppercase tracking-[0.6em] font-black text-white/50 mb-8 block">Schedule</span>
                        <h2 className="text-6xl md:text-7xl font-light mb-12 tracking-tight">Upcoming Gatherings</h2>
                        <p className="text-xl text-white/70 max-w-2xl mx-auto font-light">Join us for our scheduled sessions of reflection, study, and community building.</p>
                    </div>
                    <div className="bg-white/10 backdrop-blur-xl rounded-[4rem] overflow-hidden border border-white/10 shadow-3xl mt-24">
                        <div className="overflow-x-auto">
                            <table className="w-full text-left border-collapse">
                                <thead>
                                    <tr className="border-b border-white/10">
                                        <th className="py-12 px-12 uppercase tracking-[0.4em] text-[11px] font-black opacity-40">Time</th>
                                        <th className="py-12 px-12 uppercase tracking-[0.4em] text-[11px] font-black opacity-40">Session</th>
                                        <th className="py-12 px-12 uppercase tracking-[0.4em] text-[11px] font-black opacity-40">Speaker</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-white/5">
                                    {[
                                        { time: "09:00 AM, Saturday", session: "Youth Ministry Bible Study", speaker: "Vee & Team" },
                                        { time: "10:00 AM, Sunday", session: "Morning Reflection & Prayer", speaker: "Garden of Vee Team" },
                                        { time: "11:00 AM, Sunday", session: "Worship & Praise Session", speaker: "Guest Worship Lead" },
                                        { time: "06:00 PM, Wednesday", session: "Mid-week Scripture Study", speaker: "Community Facilitator" }
                                    ].map((item, idx) => (
                                        <tr key={idx} className="group hover:bg-white/5 transition-colors">
                                            <td className="py-12 px-12 text-base font-light text-white/60">{item.time}</td>
                                            <td className="py-12 px-12 text-3xl font-light tracking-wide group-hover:text-white transition-colors">{item.session}</td>
                                            <td className="py-12 px-12 text-sm font-bold tracking-[0.2em] uppercase text-white/40 group-hover:text-white/80 transition-colors">{item.speaker}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </motion.section>
        );

        // --- Main App ---

        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');

            const renderPage = () => {
                switch(currentPage) {
                    case 'shared-moments': return <SharedMomentsPage />;
                    case 'retreats': return <RetreatsPage />;
                    case 'faith': return <FaithPage setCurrentPage={setCurrentPage} />;
                    case 'team': return <TeamPage />;
                    case 'gatherings': return <GatheringsPage />;
                    default: return <HomePage setCurrentPage={setCurrentPage} />;
                }
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <Nav currentPage={currentPage} setCurrentPage={setCurrentPage} />
                    <main className="flex-grow pt-20">
                        <AnimatePresence mode="wait">
                            {renderPage()}
                        </AnimatePresence>
                    </main>
                    <Footer setCurrentPage={setCurrentPage} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
